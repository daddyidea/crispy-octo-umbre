<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Design Apply Hub</title>
  <style>
    :root { color-scheme: dark light; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #1a1a2e;
      color: #f6f7fb;
      padding: 1rem;
    }
    .card {
      max-width: 560px;
      width: 100%;
      background: #242447;
      border: 1px solid #383868;
      border-radius: 14px;
      padding: 1.2rem;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
    }
    h1 { margin: 0 0 0.5rem; }
    p { margin: 0.4rem 0; color: #cfd3ee; }
    a {
      display: inline-block;
      margin-top: 0.8rem;
      color: #ffffff;
      background: #4361ee;
      text-decoration: none;
      padding: 0.55rem 0.8rem;
      border-radius: 10px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>404 - Page Not Found</h1>
    <p>This route does not exist, but your app is still available.</p>
    <p>Redirecting you to the dashboard in 3 seconds...</p>
    <a href="/index.html">Go to Home Now</a>
  </main>
  <script>
    setTimeout(function () {
      window.location.replace("/index.html");
    }, 3000);
  </script>
</body>
</html>
